name: Daily CNN10 Pipeline

on:
  schedule:
    - cron: '3 21 * * *'   # JST 06:03 毎朝
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-5
          timeout_minutes: 25
          prompt: |
            You are a daily CNN10 video curator for Japanese high school entrance exam preparation.
            Run the complete pipeline below WITHOUT asking for confirmation at any step.

            ## STEP 0: Environment Setup
            ```bash
            git config --global user.email "noreply@anthropic.com"
            git config --global user.name "Claude"
            git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            TZ=Asia/Tokyo date +%Y-%m-%d
            ```
            Store the date output as TODAY.

            ## STEP 1: Load the video pool
            Read `data/video-pool.tsv` (VIDEO_ID\tTITLE per line).

            ## STEP 2: Fetch latest CNN10 videos via RSS
            Fetch: https://www.youtube.com/feeds/videos.xml?channel_id=UCTOoRgpHTjAQPk6Ak70u-pA
            Add new entries to TOP of pool. Save back to data/video-pool.tsv. If blocked, skip.

            ## STEP 3: Find used video IDs
            ```bash
            grep -roh 'watch?v=[A-Za-z0-9_-]\{11\}' content/*.md 2>/dev/null | sed 's/watch?v=//' | sort -u
            ```
            Filter pool to UNUSED entries only.

            ## STEP 4: Select exactly 2 videos
            Categories: 環境問題/テクノロジー/国際関係・多様性/医療・健康/教育・社会問題/宇宙・科学/経済・グローバリゼーション/人権・ジェンダー
            Slot 1: Most recently published unused video matching at least one category.
            Slot 2: Unused video from a DIFFERENT category than Slot 1.

            ## STEP 5: Generate analysis for each video
            Schools: 早慶高(72-76)/MARCH附属高(65-70)/関西最難関高(73-78)
            ALL 9 sections per video:
            1.タイトル日英+URL 2.入試テーマカテゴリ 3.出題されやすい学校群★ 4.重要英単語表(12-15語)+語法メモ 5.英文サマリー¶1¶2¶3(XXX words) 6.日本語全訳¶1¶2¶3 7.KEY SENTENCE🔍[構文分析][入試ポイント] 8.確認問題Q1[T/F]Q2[英問英答]Q3[穴埋め] 9.背景知識[ラベル]+📌頻出度★

            ## STEP 6: Write content/TODAY.md
            Header: # CNN10 入試英語長文対策 - YYYY年MM月DD日
            Blockquote: > 対象: 早慶高・MARCH附属高・関西最難関高（2027年度入試）
            Both videos with all 9 sections. End with ## 今日の学習アドバイス

            ## STEP 7: Commit and push to main
            ```bash
            git add content/TODAY.md data/video-pool.tsv
            git commit -m "daily: TODAY CNN10 入試対策更新"
            git push origin main
            ```

            ## STEP 8: Check for missing dates
            If content/YESTERDAY.md is missing, create that too before pushing.
